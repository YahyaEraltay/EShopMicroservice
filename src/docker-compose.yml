version: '3.4'

services:
  catalogdb:
    image: postgres:16

  basketdb:
    image: postgres:16

  catalog.api:
    image: ${DOCKER_REGISTRY-}catalogapi
    container_name: catalog.api
    build:
      context: .
      dockerfile: Services/Catalog/Catalog.API/Dockerfile

volumes:
  postgres_catalog:
  postgres_basket: